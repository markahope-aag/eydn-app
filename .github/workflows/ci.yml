name: CI

on:
  # Every push to master runs the full pipeline
  push:
    branches: [master]
  # PRs against master also run
  pull_request:
    branches: [master]
  # Manual trigger — run from GitHub Actions tab or gh CLI
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Install dependencies once, cache for downstream jobs ────────
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}

  # ── Step 2: Build (needed by lint, typecheck, and Playwright) ───────────
  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: placeholder
      CLERK_SECRET_KEY: placeholder
      SENTRY_ORG: placeholder
      SENTRY_PROJECT: placeholder
      NEXT_PUBLIC_SENTRY_DSN: placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx next build
      - uses: actions/cache/save@v5
        with:
          path: .next
          key: next-build-${{ github.sha }}

  # ── Step 3a: Type check + Lint (after build generates route types) ──────
  typecheck-lint:
    name: Type Check & Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - uses: actions/cache/restore@v5
        with:
          path: .next
          key: next-build-${{ github.sha }}
      - name: Type Check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src/

  # ── Step 3b: Unit tests (parallel with lint) ────────────────────────────
  test:
    name: Unit Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx vitest run --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  # ── Step 3c: Playwright responsive + a11y (after build) ─────────────────
  playwright:
    name: Responsive & Accessibility
    needs: build
    runs-on: ubuntu-latest
    env:
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
      E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Start dev server
        run: npx next dev --port 3000 &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run public page tests
        run: npx playwright test --project=public
      - name: Run auth setup + dashboard tests
        run: npx playwright test --project=setup --project=dashboard
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-screenshots
          path: __tests__/visual/screenshots/

  # ── Step 3e: Sitemap integrity (parallel, no build needed) ──────────────
  sitemap-check:
    name: Sitemap Integrity
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/check-sitemap.mjs

  # ── Step 3d: Security audit (parallel) ──────────────────────────────────
  security-audit:
    name: Security Audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npm audit --omit=dev --audit-level=high
